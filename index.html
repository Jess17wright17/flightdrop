<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlightDrop — Get alerts when prices drop</title>
  <style>
    /* ── Reset & base ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Card container ── */
    .card {
      background: #13131a;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
    }

    /* ── Logo / icon ── */
    .icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
      text-align: center;
    }

    /* ── Headings ── */
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* ── Form labels ── */
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
      margin-top: 1rem;
    }

    /* ── Inputs ── */
    input, select {
      width: 100%;
      background: #1e1e2a;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      color: #f0f0f5;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: #4f8ef7;
    }

    /* ── Two-column row for airport codes ── */
    .row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0.5rem;
      align-items: end;
    }

    .row .arrow {
      font-size: 1.2rem;
      color: #555;
      padding-bottom: 0.6rem;
      text-align: center;
    }

    /* ── Submit button ── */
    button[type="submit"] {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.8rem;
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover { background: #3a7be8; }
    button[type="submit"]:active { transform: scale(0.98); }

    /* ── Success / error messages ── */
    .msg {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none; /* hidden until needed */
    }

    .msg.success { background: #0f3d1f; color: #5cdb8a; display: block; }
    .msg.error   { background: #3d0f0f; color: #f07070; display: block; }

    /* ── Footer note ── */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <span class="icon">✈️</span>
    <h1>FlightDrop</h1>
    <p class="subtitle">
      Enter your route and a target price.<br>
      We'll email you the moment fares drop below it.
    </p>

    <!--
      This form sends a POST request to /subscribe on your Flask backend.
      The "action" attribute points to your server URL.
      Change it to your deployed URL when you go live (e.g. https://yourapp.railway.app/subscribe)
    -->
    <form id="signup-form">

      <label for="email">Your email</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="you@example.com"
        required
      />

      <!-- Airport codes: FROM → TO -->
      <label>Route</label>
      <div class="row">
        <div>
          <input
            type="text"
            id="origin"
            name="origin"
            placeholder="LAX"
            maxlength="3"
            style="text-transform:uppercase"
            required
          />
        </div>
        <div class="arrow">→</div>
        <div>
          <input
            type="text"
            id="destination"
            name="destination"
            placeholder="JFK"
            maxlength="3"
            style="text-transform:uppercase"
            required
          />
        </div>
      </div>

      <label for="max_price">Alert me when price drops below ($)</label>
      <input
        type="number"
        id="max_price"
        name="max_price"
        placeholder="e.g. 250"
        min="1"
        required
      />

      <label for="travel_month">Preferred travel month</label>
      <select id="travel_month" name="travel_month">
        <option value="2026-06">June 2026</option>
        <option value="2026-07">July 2026</option>
        <option value="2026-08">August 2026</option>
        <option value="2026-09">September 2026</option>
        <option value="2026-10">October 2026</option>
        <option value="2026-11">November 2026</option>
        <option value="2026-12">December 2026</option>
      </select>

      <button type="submit">Get flight alerts →</button>
    </form>

    <!-- These messages show after form submission -->
    <div class="msg" id="success-msg">
      🎉 You're in! We'll email you when prices drop.
    </div>
    <div class="msg" id="error-msg">
      Something went wrong. Please try again.
    </div>

    <p class="footer">No spam. Unsubscribe any time.</p>
  </div>

  <script>
    // Handle form submission via JavaScript (no page reload)
    document.getElementById('signup-form').addEventListener('submit', async function(e) {
      e.preventDefault(); // Stop the default browser form submit

      // Collect all form values into an object
      const data = {
        email:        document.getElementById('email').value,
        origin:       document.getElementById('origin').value.toUpperCase(),
        destination:  document.getElementById('destination').value.toUpperCase(),
        max_price:    document.getElementById('max_price').value,
        travel_month: document.getElementById('travel_month').value,
      };

      try {
        // Send the data as JSON to our Flask backend
        // CHANGE THIS URL to your deployed server address
        const response = await fetch('http://localhost:5000/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        if (response.ok) {
          // Show success message, hide the form
          document.getElementById('signup-form').style.display = 'none';
          document.getElementById('success-msg').classList.add('success');
        } else {
          document.getElementById('error-msg').classList.add('error');
        }
      } catch (err) {
        // Network error (backend not running, etc.)
        document.getElementById('error-msg').classList.add('error');
      }
    });
  </script>

</body>
</html>
